[build]
  command = "npm run build"
  publish = "dist"

# Redirects para URLs antigas (301 - Permanent Redirect)
[[redirects]]
  from = "/servicos/agentes-ia"
  to = "/servicos/agentes-de-ia"
  status = 301

# /studio -> Sanity Studio (CMS)
[[redirects]]
  from = "/studio"
  to = "https://simpli-cms.sanity.studio"
  status = 302

# Trailing slash: redirecionar para URL sem barra (canonical consistente)
[[redirects]]
  from = "/conteudo/"
  to = "/conteudo"
  status = 301
[[redirects]]
  from = "/conteudo/*/"
  to = "/conteudo/:splat"
  status = 301

# /conteudo (listagem) -> HTML com canonical e meta corretos (evita "página alternativa")
[[redirects]]
  from = "/conteudo"
  to = "/.netlify/functions/og-html?list=1"
  status = 200
  force = true

# /conteudo/:slug -> HTML com canonical e meta do post
[[redirects]]
  from = "/conteudo/*"
  to = "/.netlify/functions/og-html?splat=:splat"
  status = 200
  force = true

# Sitemap dinâmico (páginas estáticas + posts do Sanity)
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap-xml"
  status = 200
  force = true

# SPA redirect (deve ser o último)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

